syntax = "proto3";

package gateway.v1;

// Specifies the Go package name and path where code will be generated
option go_package = "gateway-service/proto/gateway/v1;gatewayv1";

// The primary gRPC service exposed by the Gateway
service GatewayService {
  rpc Chat (ChatRequest) returns (ChatResponse);
}

message ChatMessage {
  string role = 1;         // "user", "assistant", "system"
  string content = 2;
  repeated string images_base64 = 3; // Optional base64 images
}

message ChatRequest {
  string session_id = 1;   // Unique ID to keep track of user context
  repeated ChatMessage messages = 2;
}

message ChatResponse {
  string reply = 1;        // Final message generated by Primary LLM
  repeated string used_tools = 2; // Names of tools utilized in fulfilling prompt
}