syntax = "proto3";
package gateway.v1;
option go_package = "gateway-service/proto/gateway/v1";
service GatewayService {
  rpc Chat (ChatRequest) returns (ChatResponse) {}
}

message ChatRequest {
  repeated Message messages = 1;
}

message Message {
  string role = 1;
  string content = 2;
  repeated string images = 3;
}

message ChatResponse {
  Message message = 1;
}

